name: CI — Frontend (React)

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  build:
    name: Lint e Build do Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        # v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Configurar Node.js 20
        # v4.4.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Auditar dependências de produção
        run: npm audit --omit=dev --audit-level=high

      - name: Verificar qualidade do código (ESLint)
        run: npm run lint

      - name: Build de produção (TypeScript + Vite)
        run: npm run build
        env:
          CI: false
