name: CI — Frontend (React)

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  build:
    name: Lint e Build do Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar qualidade do código (ESLint)
        run: npm run lint

      - name: Build de produção (TypeScript + Vite)
        run: npm run build
        env:
          CI: false
